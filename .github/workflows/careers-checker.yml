name: Careers Checker

on:
  schedule:
    - cron: "0 8 * * *"  # ogni giorno alle 08:00 UTC
  workflow_dispatch:
    inputs:
      slack_always_notify:
        description: "Send Slack summary even if all jobs are OK"
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Run Careers Checker
        env:
          CAREERS_URL: ${{ secrets.CAREERS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # Optional: Notion DB to track job status over time
          # Create a Notion DB with: Name (title), URL (url), Status (select),
          # Department (rich_text), HTTP Code (number), Error (rich_text), Last Checked (date)
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CAREERS_DB_ID: ${{ secrets.NOTION_CAREERS_DB_ID }}

          JOBS_PAGE_LOAD_WAIT: "4000"
          SLACK_ALWAYS_NOTIFY: ${{ inputs.slack_always_notify || 'false' }}

        run: python careers_checker.py
